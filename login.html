<!doctype html>
<html id="login">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ABD Hotspot | Login</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta http-equiv="Cache-control" content="public" />
    <meta http-equiv="pragma" content="public" />
    <meta http-equiv="expires" content="-1" />
    <meta name="author" content="FCE" />
    <meta name="description" content="KnE internet hotspot status page." />
    <link rel="shortcut icon" href="style/img/ABD (kecil).jpg.jpeg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
      }

      body,
      html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        background: transparent;
      }

      .bg-image {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        background-image: url("style/img/bg-abd 1.png");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        background-attachment: fixed;
      }

      .bg-image::after {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(
          circle at center,
          rgba(8, 21, 37, 0.4) 0%,
          rgba(8, 21, 37, 0.75) 70%,
          rgba(8, 21, 37, 0.95) 100%
        );
      }

      .content-container {
        /* transform: translateY(-2vh); */
        transform: none;
        position: relative;
        background: rgba(15, 30, 50, 0.6);
        /* padding: clamp(20px, 4vw, 35px); */
        padding: 24px 28px 26px;
        border-radius: 20px;
        text-align: center;
        width: 370px;
        max-width: 92vw;
        backdrop-filter: blur(18px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow:
          0 10px 40px rgba(0, 0, 0, 0.6),
          0 0 60px rgba(0, 120, 255, 0.08);
        animation: fadeIn 0.8s ease;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(-30px);
        }
        to {
          opacity: 1;
          transform: translateY(-2vh);
        }
      }

      .logo-container {
        margin-bottom: 12px;
        margin-top: 0; /* display: flex; justify-content: center; */
      }

      .logo-container img {
        max-width: 150px; /* width: clamp(90px, 22vw, 130px); */
        width: clamp(140px, 35vw, 220px);
        height: auto;
        object-fit: contain;
        transition: transform 0.3s ease;
      }

      .logo-container img:hover {
        transform: scale(1.05);
      }

      .title-area {
        margin-top: 0px;
        margin-bottom: 15px;
        text-align: center;
      }

      .title-main {
        font-size: 21px;
        font-weight: 600;
        letter-spacing: 0.2em;
        color: #e8e4dc;
        margin-bottom: 8px;
      }

      .title-sub {
        font-size: 11px;
        letter-spacing: 0.28em;
        color: rgba(255, 255, 255, 0.35);
        margin-bottom: 28px;
      }

      .form-container {
        width: 100%;
      }

      .input-container {
        margin-bottom: 20px;
      }

      .input-container input {
        display: block;
      }

      .loginForm {
        width: 100%;
        padding: 16px 18px;
        margin-bottom: 12px;
        border-radius: 14px; /* font-size: clamp(13px, 3vw, 15px); */
        font-size: 14px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(255, 255, 255, 0.05);
        color: #ffffff;
        transition: all 0.3s ease;
      }

      .loginForm::placeholder {
        color: rgba(255, 255, 255, 0.5);
      }

      .loginForm:focus {
        border-color: #ffffff;
        box-shadow: 0 0 0 2px rgba(52, 152, 219, 0.2);
      }

      #loginButton {
        background: linear-gradient(135deg, #2563eb, #1e40af);
        color: white;
        font-weight: 600;
        border: none;
        cursor: pointer;
        transition: all 0.3s ease;
        margin-top: 6px;
        margin-bottom: 28px;
        padding: 17px;
        border-radius: 14px;
        font-size: 15px;
        font-weight: 600;
      }

      #loginButton:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(37, 99, 235, 0.4);
      }

      #smallText a {
        color: #3498db;
        text-decoration: none;
        font-weight: 500;
        transition: color 0.3s ease;
      }

      #smallText a:hover {
        color: #2980b9;
        text-decoration: underline;
      }

      .by-text {
        color: #ffffff;
      }

      #link a {
        color: #3b82f6;
      }

      #link {
        margin-top: 5px;
      }

      #link a {
        color: #3498db;
        text-decoration: none;
        font-size: 15px;
        font-weight: 500;
        transition: color 0.3s ease;
      }

      #link a:hover {
        color: #2980b9;
        text-decoration: underline;
      }

      /* Responsive adjustments */

      @media (max-width: 480px) {
        .content-container {
          padding: 25px 20px;
          width: 95%;
        }

        .logo-container img {
          max-width: 120px;
        }

        .loginForm {
          padding: 10px 12px;
          font-size: 15px;
        }
      }

      @media (max-height: 600px) {
        .content-container {
          padding: 20px 15px;
        }

        .logo-container {
          margin-bottom: 15px;
        }

        .logo-container img {
          max-width: 100px;
        }
      }

      @media (max-width: 360px) {
        .content-container {
          padding: 18px 14px;
        }
      }

      @media (max-width: 480px) {
        .content-container {
          animation:
            fadeIn 0.8s ease-out,
            float 10s ease-in-out infinite;
        }
      }

      /* POPUP IFRAME */

      .content-container {
        transform: translateY(-1vh);
      }

      #promoClose {
        position: absolute;
        top: 12px;
        right: 12px;
        background: rgba(0, 0, 0, 0.5);
        color: white;
        border: none;
        width: 32px;
        height: 32px;
        border-radius: 50%;
        cursor: pointer;
        font-size: 16px;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.3s ease;
      }

      #promoClose:hover {
        background: rgba(255, 0, 0, 0.7);
      }

      #promoPrev,
      #promoNext {
        position: fixed;
        top: 50%;
        transform: translateY(-50%);
        background: rgba(255, 255, 255, 0.2);
        color: white;
        border: none;
        width: 42px;
        height: 42px;
        border-radius: 50%;
        cursor: pointer;
        font-size: 22px;
        z-index: 10000;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.3s ease;
      }

      #promoPrev:hover,
      #promoNext:hover {
        background: rgba(255, 255, 255, 0.4);
      }

      #promoPrev {
        left: calc(50% - 450px);
      }
      #promoNext {
        right: calc(50% - 450px);
      }

      #promoOverlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.55);
        backdrop-filter: blur(6px);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 9999;
      }

      #promoBox {
        width: 90vw;
        max-width: 750px;
        aspect-ratio: 16 / 9;
        background: #000;
        border-radius: 16px;
        overflow: hidden;
        position: relative;
        animation: fadeInPopup 0.4s ease;
      }

      .slider {
        width: 100%;
        height: 100%;
        position: relative;
      }

      .slide-group {
        position: absolute;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: row;
        opacity: 0;
      }

      .slide-group.active {
        opacity: 1;
      }

      .slide {
        flex: 1;
        height: 100%;
        object-fit: cover;
        object-position: center 80%;
      }

      .slide.active {
        opacity: 1;
      }

      .more-promo-btn {
        color: rgba(255, 255, 255, 0.5);
        font-size: 14px;
        text-decoration: none;
        letter-spacing: 1px;
        font-family: "Poppins", sans-serif;
        transition:
          color 0.3s ease,
          text-shadow 0.3s ease;
      }

      .more-promo-btn:hover {
        color: #3498db;
        /* text-shadow: 0 0 12px rgba(52, 152, 219, 0.8); */
        text-decoration: underline;
      }

      @keyframes fadeInPopup {
        from {
          opacity: 0;
          transform: scale(0.9);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }

      /* ================= SPLIT SCREEN ================= */

      .split-container {
        display: flex;
        height: 100vh;
        width: 100vw;
      }

      /* LEFT SIDE */

      .left-side {
        width: 32%;
        min-width: 380px;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #0f1e32;
        flex-direction: column;
      }

      /* RIGHT SIDE */

      .right-side {
        position: relative;
        width: 68%;
        height: 100vh;
        overflow: hidden;
        flex: 1;
        display: flex;
        align-items: flex-end;
        justify-content: flex-start;
        padding-left: 80px;
      }

      /* VIDEO */

      .hero-video {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: 1;
        transition: opacity 0.8s ease-in-out;
      }

      /* FADE EFFECT */

      #videoFade {
        position: absolute;
        inset: 0;
        background: black;
        opacity: 0;
        pointer-events: none;
        z-index: 2;
        transition: opacity 0.6s ease;
      }

      /* DARK OVERLAY */

      .hero-overlay {
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.4);
        z-index: 3;
      }

      /* Overlay elegan */

      .hero-overlay {
        position: absolute;
        inset: 0;
        background: linear-gradient(
          to right,
          rgba(8, 21, 37, 0.9) 0%,
          rgba(8, 21, 37, 0.4) 50%,
          rgba(8, 21, 37, 0.1) 100%
        );
      }

      /* TEXT */
      .hero-text {
        position: absolute;
        left: 60px;
        bottom: 90px;
        z-index: 4;
        color: white;
        max-width: 600px;
      }

      .hero-text span {
        color: #c9a227;
        letter-spacing: 5px;
        font-size: 13px;
        font-weight: 500;
        text-transform: uppercase;
        display: block;
        margin-bottom: 12px;
      }

      .hero-text h1 {
        font-size: 52px;
        font-weight: 700;
        margin-bottom: 12px;
        line-height: 1.1;
        letter-spacing: -0.5px;
      }

      .hero-text p {
        color: #d1d5db;
        font-size: 14px;
      }

      /* RESPONSIVE */

      @media (max-width: 900px) {
        .left-side {
          width: 100%;
          min-width: unset;
          height: 100vh;
        }

        .right-side {
          display: none;
        }
      }

      @media (max-width: 900px) {
        #promoBox {
          width: 85vw;
          max-width: 320px;
          aspect-ratio: 9 / 16;
          border-radius: 12px;
        }

        #promoPrev,
        #promoNext {
          display: none !important;
        }
      }

      #videoAdOverlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.4);
        backdrop-filter: blur(10px);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 20000;
      }

      #videoAdBox {
        width: 75vw;
        height: calc(75vw * 16 / 9);
        max-width: 320px;
        max-height: calc(320px * 16 / 9);
        border-radius: 18px;
        overflow: hidden;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
        flex-shrink: 0;
      }

      #videoAd {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        border-radius: 18px;
      }

      #videoAdOverlay.active {
        display: flex;
      }

      /* Class Aktif */

      #videoAdOverlay.active {
        display: flex;
      }
    </style>
  </head>

    <!-- POP UP VIDEO MOBILE -->

    <div id="videoAdOverlay">
      <div id="videoAdBox">
        <video id="videoAd" autoplay muted playsinline></video>
      </div>
    </div>

    <div class="split-container">
      <!-- LEFT SIDE -->

      <div class="left-side">
        <div class="content-container">
          <div class="logo-container">
            <img
              src="style/img/ABD__kecil_.jpg-removebg-preview (1).png"
              alt="ABD Logo"
            />
          </div>

          <div class="title-area">
            <div class="title-main">NETWORK ACCESS</div>
            <div class="title-sub">HOTSPOT AUTHENTICATION</div>
          </div>
          <div class="form-container">
            <form name="login" action="$(link-login-only)" method="post">
              <div class="input-container">
                <input
                  class="loginForm"
                  type="text"
                  name="username"
                  placeholder="Username"
                  required
                  oninput="this.value = this.value.replace(/\s/g, '')"
                />
                <div style="position: relative; margin-bottom: 12px">
                  <input
                    class="loginForm"
                    type="password"
                    name="password"
                    id="passwordInput"
                    placeholder="Password"
                    required
                    oninput="this.value = this.value.replace(/\s/g, '')"
                    style="margin-bottom: 0; padding-right: 48px"
                  />
                  <span
                    id="toggleIcon"
                    onclick="togglePassword()"
                    style="
                      position: absolute;
                      right: 14px;
                      top: 50%;
                      transform: translateY(-50%);
                      cursor: pointer;
                      color: rgba(255, 255, 255, 0.4);
                      user-select: none;
                      transition: all 0.3s ease;
                      line-height: 0;
                    "
                  >
                    <svg
                      id="iconOpen"
                      xmlns="http://www.w3.org/2000/svg"
                      width="20"
                      height="20"
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      style="display: none"
                    >
                      <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                      <circle cx="12" cy="12" r="3" />
                    </svg>
                    <svg
                      id="iconClosed"
                      xmlns="http://www.w3.org/2000/svg"
                      width="20"
                      height="20"
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      style="display: block"
                    >
                      <path
                        d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"
                      />
                      <path
                        d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"
                      />
                      <line x1="1" y1="1" x2="23" y2="23" />
                    </svg>
                  </span>
                </div>
              </div>

              <div class="button-container">
                <input
                  class="loginForm"
                  id="loginButton"
                  type="submit"
                  value="LOGIN"
                />
              </div>
            </form>
          </div>

          <div class="login-footer">
            <span class="by-text"> by </span>
            <div id="link">
              <a href="https://portal.asianbay.co.id/" target="_blank"
                >IT Asian Bay Development</a
              >
            </div>
            <p
              style="
                color: #3498db;
                font-size: 11px;
                text-align: center;
                margin-top: 12px;
              "
            >
              © 2026 ABD · Developed by Jery Andrian
            </p>
          </div>
        </div>

        <!-- More Promo di luar card -->
        <p style="margin-top: 14px; text-align: center">
          <!-- <a href="#" class="more-promo-btn"> More Promo </a> -->
        </p>
      </div>

      <!-- RIGHT SIDE -->
      <div class="right-side">
        <video
          id="bgvideo"
          class="hero-video"
          autoplay
          muted
          playsinline
          preload="auto"
        ></video>

        <div id="videoFade"></div>
        <div class="hero-overlay"></div>
        <div class="hero-text">
          <span id="greeting"></span>
          <h1>Welcome Back.</h1>
          <p id="date-location"></p>
        </div>
      </div>
    </div>

    <script src="popup.js"></script>
    <script src="bg-loop.js"></script>
    <script src="time.js"></script>
    <script src="video-ads.js"></script>
    <script src="toogle-password.js"></script>
  </body>
</html>
